name: Nightly Anomaly Detection Pipeline

on:
  schedule:
    # Run every day at 6:00 AM UTC (after previous day's data is finalized)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate database & run anomaly detection
        run: |
          python src/create_demo_data.py
          python src/rca_model_analysis.py
          python src/evaluation_metrics.py
          python src/statistical_confidence.py

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Generate analyst report
        run: python src/generate_analyst_report.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-anomaly-report-${{ github.run_number }}
          path: |
            results/
            reports/analyst_report.html
          retention-days: 30

      - name: Check for critical anomalies
        run: |
          python -c "
          import pandas as pd
          import sys
          df = pd.read_csv('results/model_comparison.csv')
          best = df[df['method_type']=='isolation_forest']
          reasonable = best[(best['anomaly_pct'] >= 3) & (best['anomaly_pct'] <= 10)]
          rate = len(reasonable) / len(best) * 100
          print(f'✅ Isolation Forest success rate: {rate:.1f}%')
          if rate < 70:
              print('⚠️ WARNING: Model performance degraded below 70% threshold!')
              sys.exit(1)
          "
